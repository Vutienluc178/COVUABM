<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đại Cẩm Nang Khai Cuộc Cờ Vua - Pro Version</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <!-- Chessboard.js CSS -->
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body {
            background-color: #f1f5f9;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        .tag-white { background: #fee2e2; color: #991b1b; padding: 2px 6px; border-radius: 4px; font-size: 0.65rem; font-weight: bold; }
        .tag-black { background: #dcfce7; color: #166534; padding: 2px 6px; border-radius: 4px; font-size: 0.65rem; font-weight: bold; }
        .tag-basic { background: #e0f2fe; color: #075985; padding: 2px 6px; border-radius: 4px; font-size: 0.65rem; font-weight: bold; }

        .category-header { cursor: pointer; transition: background 0.2s; }
        .category-header:hover { background: #e2e8f0; }
        .category-icon { transition: transform 0.3s; }
        .category-open .category-icon { transform: rotate(180deg); }

        .variation-btn { transition: all 0.2s; border-left: 3px solid transparent; }
        .variation-btn:hover:not(.active) { background: #f8fafc; border-left-color: #cbd5e1; }
        .variation-btn.active { background: #0f172a; color: white; border-left-color: #3b82f6; }
        .variation-btn.active .tag-basic,
        .variation-btn.active .tag-white,
        .variation-btn.active .tag-black { opacity: 0.9; }
        .variation-list { display: none; }
        .category-open .variation-list { display: block; }

        /* Chế độ giấu bài */
        .blur-text {
            filter: blur(5px);
            user-select: none;
            transition: filter 0.3s;
        }
    </style>
</head>
<body class="text-slate-800 h-screen flex flex-col">

    <!-- Header -->
    <header class="bg-slate-900 text-white p-4 shadow-md z-10 border-b-4 border-amber-500">
        <div class="container mx-auto flex items-center justify-center text-center">
            <i class="fa-solid fa-chess-king text-3xl mr-3 text-amber-400"></i>
            <div>
                <h1 class="text-xl md:text-2xl font-bold">Khai Cuộc Cờ Vua Pro</h1>
                <p class="text-xs md:text-sm text-slate-400">Huấn luyện chuyên sâu: Lật bàn cờ, Thi đấu & Chấm điểm</p>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 container mx-auto p-4 flex flex-col md:flex-row gap-6 overflow-hidden">

        <!-- Sidebar: Danh mục Accordion -->
        <div class="w-full md:w-1/3 bg-white rounded-lg shadow-lg flex flex-col overflow-hidden h-[45vh] md:h-auto border border-slate-200">
            <div class="bg-slate-100 p-3 border-b border-slate-200 flex justify-between items-center">
                <h2 class="font-bold text-slate-800"><i class="fa-solid fa-list-ul mr-2"></i>Chọn Bài Học</h2>
            </div>
            <div class="overflow-y-auto flex-1 custom-scrollbar" id="menu-container">
                <!-- Accordion Menu sinh bằng JS -->
            </div>
        </div>

        <!-- Right Panel: Bàn cờ và Thông tin -->
        <div class="w-full md:w-2/3 bg-white rounded-lg shadow-lg p-4 md:p-6 flex flex-col overflow-y-auto border border-slate-200 relative">

            <div class="text-center mb-4">
                <div class="inline-block bg-amber-100 text-amber-800 text-xs font-bold px-3 py-1 rounded-full mb-2" id="opening-parent-name"></div>
                <h2 id="opening-title" class="text-2xl font-bold text-slate-900 mb-2">Vui lòng chọn một nhánh</h2>
                <p id="opening-desc" class="text-slate-600 min-h-[4rem] text-sm md:text-base bg-slate-50 p-3 rounded-lg border border-slate-100"></p>
            </div>

            <div class="flex flex-col lg:flex-row gap-8 items-center lg:items-start justify-center">
                <!-- Board Container -->
                <div class="w-full max-w-[420px] flex flex-col">
                    <div id="board" class="w-full shadow-lg rounded-sm overflow-hidden border-2 border-slate-700 relative"></div>

                    <!-- Progress Bar & Score -->
                    <div class="flex justify-between items-center mt-4 mb-1">
                        <div class="w-full bg-slate-200 rounded-full h-2.5 overflow-hidden shadow-inner relative flex-1 mr-4">
                            <div id="progress-bar" class="bg-gradient-to-r from-blue-500 to-amber-500 h-2.5 rounded-full transition-all duration-500 ease-out" style="width: 0%"></div>
                        </div>
                        <!-- Bảng Điểm -->
                        <div id="score-display" class="hidden font-extrabold text-sm text-indigo-700 whitespace-nowrap bg-indigo-100 px-3 py-1 rounded-md shadow-sm border border-indigo-200 transition-all">
                            <i class="fa-solid fa-star text-amber-500 mr-1"></i> Điểm: <span id="score-text">0/0</span>
                        </div>
                    </div>
                    <div class="text-left text-xs font-bold text-slate-500 mb-2" id="progress-text">0 / 0 nước đi</div>
                </div>

                <!-- Controls & Info -->
                <div class="flex flex-col w-full max-w-[320px] gap-4">

                    <!-- Khung Lịch sử nước đi -->
                    <div class="bg-slate-800 text-white p-4 rounded-lg shadow-inner relative">
                        <div class="flex justify-between items-center mb-2">
                            <h3 class="font-bold text-xs text-slate-400 uppercase tracking-wider">Lịch sử nước đi</h3>

                            <!-- Nút chuyển chế độ THI (Exam Mode) -->
                            <label class="inline-flex items-center cursor-pointer" id="exam-mode-wrapper" style="display: none;">
                                <span class="mr-2 text-xs font-bold text-rose-400"><i class="fa-solid fa-eye-slash mr-1"></i>Thi đấu</span>
                                <input type="checkbox" id="exam-toggle" class="sr-only peer">
                                <div class="w-7 h-4 bg-slate-600 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-3 after:w-3 after:transition-all peer-checked:bg-rose-500"></div>
                            </label>
                        </div>
                        <div id="moves-history" class="font-mono text-lg flex flex-wrap gap-2 text-amber-300 min-h-[2rem]">
                            <!-- Nước đi hiển thị ở đây -->
                        </div>
                    </div>

                    <div class="mt-auto">

                        <!-- Chế độ Thực hành Toggle -->
                        <div class="bg-indigo-50 rounded-lg border border-indigo-200 p-3 flex justify-between items-center mb-3">
                            <div class="font-bold text-indigo-900 text-sm"><i class="fa-solid fa-graduation-cap mr-2"></i>Chế Độ Học Bài</div>
                            <label class="relative inline-flex items-center cursor-pointer">
                                <input type="checkbox" id="practice-toggle" class="sr-only peer">
                                <div class="w-11 h-6 bg-gray-300 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-indigo-600"></div>
                            </label>
                        </div>

                        <!-- Khung Phản Hồi Học Bài -->
                        <div id="feedback-msg" class="hidden text-center text-sm font-bold p-3 rounded shadow-sm mb-3"></div>

                        <!-- Các nút điều khiển Xem Cờ -->
                        <div id="normal-controls" class="grid grid-cols-2 gap-2 mb-3">
                            <button id="btn-next" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 rounded shadow-md flex items-center justify-center transition text-sm">
                                <i class="fa-solid fa-step-forward mr-1"></i> Tới
                            </button>
                            <button id="btn-play" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-2 rounded shadow-md flex items-center justify-center transition text-sm">
                                <i class="fa-solid fa-play mr-1"></i> Chạy
                            </button>
                        </div>

                        <!-- Các nút điều khiển Học Bài -->
                        <button id="btn-hint" class="hidden w-full bg-amber-500 hover:bg-amber-600 text-white font-bold py-3 px-4 rounded shadow flex items-center justify-center transition mb-3">
                            <i class="fa-solid fa-lightbulb mr-2"></i> Xem Gợi Ý
                        </button>

                        <div class="grid grid-cols-2 gap-2">
                            <button id="btn-flip" class="bg-slate-700 hover:bg-slate-800 text-white font-bold py-2 rounded shadow flex items-center justify-center transition text-sm">
                                <i class="fa-solid fa-retweet mr-1"></i> Lật Cờ
                            </button>
                            <button id="btn-reset" class="bg-slate-200 hover:bg-slate-300 text-slate-800 font-bold py-2 rounded shadow flex items-center justify-center transition text-sm">
                                <i class="fa-solid fa-rotate-left mr-1"></i> Xếp Lại
                            </button>
                        </div>

                    </div>
                </div>
            </div>
        </div>

    </main>

    <!-- Scripts -->
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

    <script>
        // CƠ SỞ DỮ LIỆU KHAI CUỘC
        const openingData = [
            {
                category: "1. Ván cờ Italia",
                variations: [
                    { name: "Giuoco Piano (Truyền thống)", type: "Cơ bản", desc: "Hai bên đều đưa Tượng lên c4, c5 ngắm vào điểm f7, f2. Trắng thường chơi c3 d3 để tạo thế trận chậm mà chắc.", moves: ["e4", "e5", "Nf3", "Nc6", "Bc4", "Bc5", "c3", "Nf6", "d3", "d6"] },
                    { name: "Tấn công Greco (d4 Trung tâm)", type: "Trắng Tấn Công", desc: "Trắng dâng tốt d4 tạo đột phá trung tâm, chấp nhận thí tốt để mở toang cột và đường chéo tấn công Vua Đen cực kỳ ác liệt. Còn gọi là Giuoco Piano cánh tấn công.", moves: ["e4", "e5", "Nf3", "Nc6", "Bc4", "Bc5", "c3", "Nf6", "d4", "exd4", "cxd4", "Bb4+", "Nc3", "Nxe4", "O-O", "Bxc3", "d5", "Bf6", "Re1", "Ne7", "Rxe4", "d6"] },
                    { name: "Fried Liver Attack", type: "Trắng Tấn Công", desc: "Khi Đen chơi Mã f6, Trắng lập tức nhảy Ng5 nhắm f7. Nếu Đen đi Nxd5 sai lầm, Trắng thí Mã vào f7 tạo bão cấp 12 lên Vua Đen.", moves: ["e4", "e5", "Nf3", "Nc6", "Bc4", "Nf6", "Ng5", "d5", "exd5", "Nxd5", "Nxf7", "Kxf7", "Qf3+", "Ke6", "Nc3"] },
                    { name: "Phòng thủ Polerio (Na5)", type: "Đen Khắc Chế", desc: "Cách Đen phá giải chuẩn xác đòn Gan Chiên (Ng5). Đen thí 1 tốt bằng cách nhảy Na5 để đuổi Tượng Trắng, giành quyền chủ động.", moves: ["e4", "e5", "Nf3", "Nc6", "Bc4", "Nf6", "Ng5", "d5", "exd5", "Na5", "Bb5+", "c6", "dxc6", "bxc6", "Be2", "h6", "Nf3", "e4", "Ne5", "Bd6"] },
                    { name: "Phản công Traxler", type: "Đen Khắc Chế", desc: "Đen đáp trả Ng5 bằng việc 'bỏ mặc f7', lên Tượng Bc5. Nếu Trắng ăn f7, Đen thí ngược Bxf2+ và tung đòn chiếu hết cực độc.", moves: ["e4", "e5", "Nf3", "Nc6", "Bc4", "Nf6", "Ng5", "Bc5", "Nxf7", "Bxf2+", "Kxf2", "Nxe4+", "Kg1", "Qh4", "g3", "Nxg3", "Nxh8", "Nd4"] },
                    { name: "Bẫy Blackburne Shilling", type: "Đen Giăng Bẫy", desc: "Đen dụ Trắng ăn tốt e5 bằng cách đi Mã d4. Nếu Trắng 'mắc mưu' Nxe5??, Đen tung Hậu Qg5 và giăng lưới chiếu hết chỉ sau 7 nước.", moves: ["e4", "e5", "Nf3", "Nc6", "Bc4", "Nd4", "Nxe5", "Qg5", "Nxf7", "Qxg2", "Rf1", "Qxe4+", "Be2", "Nf3#"] }
                ]
            },
            {
                category: "2. Ván cờ Tây Ban Nha (Ruy Lopez)",
                variations: [
                    { name: "Phòng thủ Morphy (Chính thống)", type: "Cơ bản", desc: "Cách phổ biến nhất của Đen: Đẩy tốt a6 hỏi tội Tượng b5 của Trắng. Đây là đường lối dẫn đến thế trận chiến lược cực kỳ sâu sắc.", moves: ["e4", "e5", "Nf3", "Nc6", "Bb5", "a6", "Ba4", "Nf6", "O-O", "Be7", "Re1", "b5", "Bb3", "d6", "c3", "O-O", "h3"] },
                    { name: "Biến Đổi Quân (Exchange)", type: "Trắng Khắc Chế", desc: "Trắng chủ động ăn Bxc6, làm hỏng cấu trúc tốt cánh Hậu của Đen. Đổi lại, Đen có cặp Tượng. Huyền thoại Bobby Fischer rất thích biến này.", moves: ["e4", "e5", "Nf3", "Nc6", "Bb5", "a6", "Bxc6", "dxc6", "O-O", "f6", "d4", "exd4", "Nxd4", "c5", "Nb3", "Qxd1", "Rxd1"] },
                    { name: "Phòng thủ Berlin", type: "Đen Khắc Chế", desc: "Bức tường Berlin! Đen ép Trắng đổi Hậu sớm và đưa về cờ tàn siêu vững chắc mà các Đại Kiện Tướng rất sợ phải đối mặt.", moves: ["e4", "e5", "Nf3", "Nc6", "Bb5", "Nf6", "O-O", "Nxe4", "d4", "Nd6", "Bxc6", "dxc6", "dxe5", "Nf5", "Qxd8+", "Kxd8"] },
                    { name: "Gambit Marshall", type: "Đen Tấn Công", desc: "Đen chủ động thí tốt d5 để đổi lấy đòn tấn công hủy diệt vào cánh Vua Trắng. Kiện tướng thế giới thường phải học thuộc lòng cách đỡ đòn này.", moves: ["e4", "e5", "Nf3", "Nc6", "Bb5", "a6", "Ba4", "Nf6", "O-O", "Be7", "Re1", "b5", "Bb3", "O-O", "c3", "d5", "exd5", "Nxd5", "Nxe5", "Nxe5", "Rxe5", "c6"] },
                    { name: "Phòng thủ Schliemann", type: "Đen Tấn Công", desc: "Đòn đánh cực gắt và rủi ro cao từ Đen: đẩy f5 ngay lập tức để phá vỡ trung tâm, kéo Trắng vào một cuộc chiến tay đôi đẫm máu.", moves: ["e4", "e5", "Nf3", "Nc6", "Bb5", "f5", "Nc3", "fxe4", "Nxe4", "d5", "Nxe5", "dxe4", "Nxc6", "Qg5", "Qe2", "Nf6"] },
                    { name: "Bẫy Con Thuyền Noah", type: "Đen Giăng Bẫy", desc: "Một cái bẫy kinh điển! Trắng ham ăn tốt d4 bằng Hậu. Đen lập tức đẩy tốt c5 c4 nhốt chết Tượng Trắng ở b3 không đường thoát.", moves: ["e4", "e5", "Nf3", "Nc6", "Bb5", "a6", "Ba4", "d6", "d4", "b5", "Bb3", "Nxd4", "Nxd4", "exd4", "Qxd4", "c5", "Qd5", "Be6", "Qc6+", "Bd7", "Qd5", "c4"] }
                ]
            },
            {
                category: "3. Phòng thủ Sicilia",
                variations: [
                    { name: "Biến Najdorf", type: "Cơ bản", desc: "Một trong những khai cuộc sắc bén và phức tạp nhất. Đen đi a6 để ngăn Trắng đưa Tượng/Mã vào b5, chuẩn bị dọn đường phản công cánh Hậu.", moves: ["e4", "c5", "Nf3", "d6", "d4", "cxd4", "Nxd4", "Nf6", "Nc3", "a6", "Bg5", "e6", "f4", "Be7"] },
                    { name: "Biến Dragon (Con Rồng)", type: "Đen Tấn Công", desc: "Đen Fianchetto Tượng lên g7 (hình dáng giống đuôi rồng). Tạo ra sức ép cực lớn lên đường chéo dài, dẫn đến thế cờ đôi công nảy lửa.", moves: ["e4", "c5", "Nf3", "d6", "d4", "cxd4", "Nxd4", "Nf6", "Nc3", "g6", "Be3", "Bg7", "f3", "O-O", "Qd2", "Nc6", "O-O-O"] },
                    { name: "Biến Sveshnikov (Pelikan)", type: "Đen Phản Công", desc: "Đen chủ động đẩy e5 đuổi Mã Trắng, chấp nhận để lại lỗ hổng ở d5. Bù lại, Đen có thế trận cực kỳ chủ động và linh hoạt ở hai cánh.", moves: ["e4", "c5", "Nf3", "Nc6", "d4", "cxd4", "Nxd4", "Nf6", "Nc3", "e5", "Ndb5", "d6", "Bg5", "a6", "Na3", "b5", "Nd5", "Be7", "Bxf6", "Bxf6", "c3"] },
                    { name: "Biến Alapin (c3)", type: "Trắng Khắc Chế", desc: "Cách Trắng né tránh lý thuyết phức tạp của Sicilia. Trắng đẩy c3 chuẩn bị d4, xây dựng trung tâm vững chắc, đưa ván cờ về thế trận chậm rãi hơn.", moves: ["e4", "c5", "c3", "Nf6", "e5", "Nd5", "d4", "cxd4", "Nf3", "e6", "cxd4", "d6", "Bc4", "Nb6", "Bb3"] },
                    { name: "Smith-Morra Gambit", type: "Trắng Tấn Công", desc: "Trắng táo bạo thí luôn 1 Tốt ở c3 để đổi lấy tốc độ dàn quân thần tốc. Nếu Đen phòng thủ không khéo, sẽ bị bóp nghẹt không thở nổi từ rất sớm.", moves: ["e4", "c5", "d4", "cxd4", "c3", "dxc3", "Nxc3", "Nc6", "Nf3", "d6", "Bc4", "e6", "O-O", "Nf6", "Qe2"] },
                    { name: "Bẫy Siberian", type: "Đen Giăng Bẫy", desc: "Nằm trong nhánh Smith-Morra Gambit. Đen lén lút đưa Mã lên g4. Nếu Trắng chủ quan đuổi Mã bằng h3??, Đen tung đòn Nd4 hy sinh Mã để chiếu hết siêu đẹp!", moves: ["e4", "c5", "d4", "cxd4", "c3", "dxc3", "Nxc3", "Nc6", "Nf3", "e6", "Bc4", "Qc7", "O-O", "Nf6", "Qe2", "Ng4", "h3", "Nd4", "Nxd4", "Qh2#"] },
                    { name: "Bẫy Bắt Hậu (Biến Dragon-Sozin)", type: "Trắng Giăng Bẫy", desc: "Trắng đưa Tượng lên c4 (biến Sozin) nhắm vào f7. Khi Đen theo hướng Dragon với g6, Trắng tung đòn Nxc6 rồi e5, thí Tượng Bxf7+ chiếu Vua để bắt sống Hậu Đen ở d8.", moves: ["e4", "c5", "Nf3", "d6", "d4", "cxd4", "Nxd4", "Nf6", "Nc3", "Nc6", "Bc4", "g6", "Nxc6", "bxc6", "e5", "dxe5", "Bxf7+", "Kxf7", "Qxd8"] }
                ]
            },
            {
                category: "4. Phòng thủ Pháp",
                variations: [

        // --- BIẾN ĐIỂM SỐ ---
        let currentScore = 0;
        let maxScore = 0;
        let movePoints = 10; // Điểm nhận được cho mỗi bước đi (tối đa 10)

        let board = null;
        let game = new Chess();
        let currentOpening = null;
        let currentMoveIndex = 0;
        let playInterval = null;

        let isPracticeMode = false;
        let isExamMode = false;

        // Khởi tạo menu Accordion
        function initMenu() {
            const container = document.getElementById('menu-container');

            openingData.forEach((cat, catIndex) => {
                const catDiv = document.createElement('div');
                catDiv.className = 'border-b border-slate-200';

                const catHeader = document.createElement('div');
                catHeader.className = 'category-header p-3 font-semibold text-slate-800 flex justify-between items-center';
                catHeader.innerHTML = `<span>${cat.category}</span> <i class="fa-solid fa-chevron-down category-icon text-slate-400 text-sm"></i>`;

                const varList = document.createElement('div');
                varList.className = 'variation-list bg-slate-50 border-t border-slate-100';

                cat.variations.forEach((op, varIndex) => {
                    const btn = document.createElement('div');
                    btn.className = `variation-btn p-3 pl-8 text-sm cursor-pointer flex flex-col`;

                    let tagHtml = '';
                    if (op.type.includes("Trắng")) tagHtml = `<span class="tag-white">${op.type}</span>`;
                    else if (op.type.includes("Đen")) tagHtml = `<span class="tag-black">${op.type}</span>`;
                    else tagHtml = `<span class="tag-basic">${op.type}</span>`;

                    btn.innerHTML = `<div class="font-medium mb-1">${op.name}</div><div>${tagHtml}</div>`;
                    btn.onclick = () => selectVariation(catIndex, varIndex, catDiv, btn);
                    varList.appendChild(btn);
                });

                catDiv.appendChild(catHeader);
                catDiv.appendChild(varList);

                catHeader.onclick = () => {
                    document.querySelectorAll('#menu-container > div').forEach(d => {
                        if (d !== catDiv) d.classList.remove('category-open');
                    });
                    catDiv.classList.toggle('category-open');
                };

                container.appendChild(catDiv);
            });
        }

        function selectVariation(catIndex, varIndex, catDiv, btnEl) {
            document.querySelectorAll('.variation-btn').forEach(b => b.classList.remove('active'));
            btnEl.classList.add('active');
            catDiv.classList.add('category-open');

            stopAutoPlay();
            currentOpening = openingData[catIndex].variations[varIndex];

            document.getElementById('opening-parent-name').innerText = openingData[catIndex].category;
            document.getElementById('opening-title').innerText = currentOpening.name;
            document.getElementById('opening-desc').innerText = currentOpening.desc;

            if (currentOpening.type.includes("Đen")) board.orientation('black');
            else board.orientation('white');

            resetCurrentBoard();
        }

        // --- CÁC HÀM ĐIỀU KHIỂN XEM CỜ ---
        function nextMove() {
            if (!currentOpening) return;
            if (currentMoveIndex < currentOpening.moves.length) {
                game.move(currentOpening.moves[currentMoveIndex]);
                board.position(game.fen());
                currentMoveIndex++;
                updateMovesHistory();
                updateButtons();
                updateProgressBar();
            } else {
                stopAutoPlay();
            }
        }

        function toggleAutoPlay() {
            if (!currentOpening) return;
            const btnPlay = document.getElementById('btn-play');

            if (playInterval) {
                stopAutoPlay();
            } else {
                if (currentMoveIndex >= currentOpening.moves.length) {
                    resetCurrentBoard();
                }
                btnPlay.innerHTML = '<i class="fa-solid fa-pause mr-1"></i> Dừng';
                btnPlay.classList.replace('bg-emerald-500', 'bg-rose-500');
                btnPlay.classList.replace('hover:bg-emerald-600', 'hover:bg-rose-600');
                playInterval = setInterval(nextMove, 1200);
            }
        }

        function stopAutoPlay() {
            if (playInterval) {
                clearInterval(playInterval);
                playInterval = null;
            }
            const btnPlay = document.getElementById('btn-play');
            if(btnPlay) {
                btnPlay.innerHTML = '<i class="fa-solid fa-play mr-1"></i> Chạy';
                btnPlay.classList.replace('bg-rose-500', 'bg-emerald-500');
                btnPlay.classList.replace('hover:bg-rose-600', 'hover:bg-emerald-600');
            }
        }

        function resetCurrentBoard() {
            if (!currentOpening) return;
            stopAutoPlay();
            game.reset();
            board.position(game.fen());

            currentMoveIndex = 0;
            currentScore = 0;
            movePoints = 10;
            maxScore = currentOpening.moves.length * 10;

            updateMovesHistory();
            updateButtons();
            updateProgressBar();
            updateScoreUI();

            if (isPracticeMode) {
                updateFeedbackTurn();
            }
        }

        function flipBoard() {
            board.flip();
        }

        // --- CÁC HÀM ĐIỀU KHIỂN HỌC BÀI, THI ĐẤU & CHẤM ĐIỂM ---
        function togglePracticeModeUI() {
            const normalControls = document.getElementById('normal-controls');
            const feedback = document.getElementById('feedback-msg');
            const btnHint = document.getElementById('btn-hint');
            const examWrapper = document.getElementById('exam-mode-wrapper');

            if (isPracticeMode) {
                normalControls.style.display = 'none';
                feedback.classList.remove('hidden');
                btnHint.classList.remove('hidden');
                btnHint.classList.add('flex');
                examWrapper.style.display = 'inline-flex';
                stopAutoPlay();
                updateFeedbackTurn();
            } else {
                normalControls.style.display = 'grid';
                feedback.classList.add('hidden');
                btnHint.classList.add('hidden');
                btnHint.classList.remove('flex');
                examWrapper.style.display = 'none';

                document.getElementById('exam-toggle').checked = false;
                toggleExamMode(false);
                stopAutoPlay();
            }
            updateScoreUI();
        }

        function toggleExamMode(isExam) {
            isExamMode = isExam;
            const historyDiv = document.getElementById('moves-history');
            const btnHint = document.getElementById('btn-hint');

            if (isExam) {
                historyDiv.classList.add('blur-text');
                btnHint.disabled = true;
                btnHint.classList.add('opacity-50', 'cursor-not-allowed');
                btnHint.innerHTML = '<i class="fa-solid fa-lock mr-2"></i> Gợi ý bị khóa (Đang Thi)';
            } else {
                historyDiv.classList.remove('blur-text');
                btnHint.disabled = false;
                btnHint.classList.remove('opacity-50', 'cursor-not-allowed');
                btnHint.innerHTML = '<i class="fa-solid fa-lightbulb mr-2"></i> Xem Gợi Ý';
            }
        }

        function showFeedback(msg, type) {
            const el = document.getElementById('feedback-msg');
            el.innerHTML = msg;
            el.className = 'text-center text-sm font-bold p-3 rounded shadow-sm mb-3 transition-all ';
            if (type === 'error') {
                el.classList.add('bg-rose-100', 'text-rose-700', 'border', 'border-rose-300');
            } else if (type === 'success') {
                el.classList.add('bg-emerald-100', 'text-emerald-800', 'border', 'border-emerald-300');
            } else {
                el.classList.add('bg-indigo-100', 'text-indigo-800', 'border', 'border-indigo-300');
            }
        }

        function updateScoreUI() {
            const displayEl = document.getElementById('score-display');
            if (isPracticeMode) {
                displayEl.classList.remove('hidden');
                document.getElementById('score-text').innerText = `${currentScore}/${maxScore}`;
            } else {
                displayEl.classList.add('hidden');
            }
        }

        function updateFeedbackTurn() {
            if(!currentOpening) return;
            if (currentMoveIndex >= currentOpening.moves.length) {
                // Tính % để xếp loại
                let percent = maxScore > 0 ? Math.round((currentScore / maxScore) * 100) : 0;
                let grade = "";

                if (percent === 100) grade = "🏆 HOÀN HẢO!";
                else if (percent >= 80) grade = "🌟 XUẤT SẮC!";
                else if (percent >= 50) grade = "👍 TỐT!";
                else grade = "💪 CẦN CỐ GẮNG THÊM!";

                if (isExamMode) {
                    showFeedback(`${grade}<br>Bạn đã thi xong với điểm số: <span class='text-lg'>${currentScore}/${maxScore}</span>`, "success");
                } else {
                    showFeedback(`${grade}<br>Bạn đạt <span class='text-lg'>${currentScore}/${maxScore}</span> điểm (${percent}%).`, "success");
                }
                return;
            }
            const color = (currentMoveIndex % 2 === 0) ? "Trắng" : "Đen";
            showFeedback(`👉 Đến lượt ${color} đi. Kéo thả quân cờ!`, "info");
        }

        // Sự kiện khi Kéo & Thả quân cờ
        function onDragStart (source, piece, position, orientation) {
            if (!isPracticeMode) return false;
            if (game.game_over()) return false;

            if ((game.turn() === 'w' && piece.search(/^b/) !== -1) ||
                (game.turn() === 'b' && piece.search(/^w/) !== -1)) {
                return false;
            }
            if (!currentOpening || currentMoveIndex >= currentOpening.moves.length) return false;
        }

        function onDrop (source, target) {
            if (!isPracticeMode || !currentOpening) return 'snapback';

            let expectedMoveSAN = currentOpening.moves[currentMoveIndex];

            let attempt = game.move({
                from: source,
                to: target,
                promotion: 'q'
            });

            if (attempt === null) return 'snapback';

            let attemptSanClean = attempt.san.replace(/[+#]/g, '');
            let expectedSanClean = expectedMoveSAN.replace(/[+#]/g, '');

            if (attemptSanClean !== expectedSanClean) {
                game.undo();
                // Xử lý Trừ điểm khi đi sai
                movePoints = Math.max(0, movePoints - 3);
                showFeedback(`❌ Sai rồi! Kéo lại nhé.<br><span class="text-xs text-rose-500">(Bị trừ 3 điểm cho nước này)</span>`, "error");
                return 'snapback';
            }

            // Đúng
            currentScore += movePoints;
            movePoints = 10; // Reset điểm 10 cho nước đi tiếp theo

            currentMoveIndex++;
            updateMovesHistory();
            updateButtons();
            updateProgressBar();
            updateScoreUI();

            updateFeedbackTurn();
        }

        function onSnapEnd () {
            board.position(game.fen());
        }

        // --- CÁC HÀM CẬP NHẬT UI ---
        function updateButtons() {
            const btnNext = document.getElementById('btn-next');
            if (!currentOpening || currentMoveIndex >= currentOpening.moves.length) {
                btnNext.disabled = true;
                btnNext.classList.add('opacity-50', 'cursor-not-allowed');
            } else {
                btnNext.disabled = false;
                btnNext.classList.remove('opacity-50', 'cursor-not-allowed');
            }
        }

        function updateProgressBar() {
            if (!currentOpening) return;
            const total = currentOpening.moves.length;
            const current = currentMoveIndex;
            const percent = (current / total) * 100;

            document.getElementById('progress-bar').style.width = `${percent}%`;
            document.getElementById('progress-text').innerText = `${current} / ${total} nước đi`;
        }

        function updateMovesHistory() {
            const container = document.getElementById('moves-history');
            container.innerHTML = '';

            if (!currentOpening) return;

            let moveNumber = 1;
            for (let i = 0; i < currentOpening.moves.length; i++) {
                if (i % 2 === 0) {
                    const numSpan = document.createElement('span');
                    numSpan.className = 'text-slate-500 font-bold ml-1';
                    numSpan.innerText = `${moveNumber}.`;
                    container.appendChild(numSpan);
                    moveNumber++;
                }

                const moveSpan = document.createElement('span');
                moveSpan.innerText = currentOpening.moves[i];

                if (i < currentMoveIndex) {
                    moveSpan.className = 'text-slate-900 font-bold bg-amber-400 px-1 rounded shadow-sm';
                } else {
                    moveSpan.className = 'text-slate-500';
                }

                container.appendChild(moveSpan);
            }
        }

        // --- KHỞI TẠO TRANG ---
        $(document).ready(function() {
            var config = {
                draggable: true,
                position: 'start',
                pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png',
                showNotation: true,
                onDragStart: onDragStart,
                onDrop: onDrop,
                onSnapEnd: onSnapEnd
            };
            board = Chessboard('board', config);

            // Nút điều khiển
            document.getElementById('btn-next').addEventListener('click', nextMove);
            document.getElementById('btn-play').addEventListener('click', toggleAutoPlay);
            document.getElementById('btn-reset').addEventListener('click', resetCurrentBoard);
            document.getElementById('btn-flip').addEventListener('click', flipBoard);

            // Công tắc
            document.getElementById('practice-toggle').addEventListener('change', function(e) {
                isPracticeMode = e.target.checked;
                togglePracticeModeUI();
                resetCurrentBoard();
            });

            document.getElementById('exam-toggle').addEventListener('change', function(e) {
                toggleExamMode(e.target.checked);
            });

            // Nút Gợi ý
            document.getElementById('btn-hint').addEventListener('click', function() {
                if(!isPracticeMode || !currentOpening || isExamMode) return;
                if(currentMoveIndex < currentOpening.moves.length) {
                    // Phạt điểm khi dùng quyền trợ giúp
                    movePoints = Math.max(0, movePoints - 5);
                    showFeedback(`💡 Gợi ý: Kéo <b>${currentOpening.moves[currentMoveIndex]}</b><br><span class="text-xs text-emerald-600">(Bị trừ 5 điểm cho nước này)</span>`, "success");
                }
            });

            $(window).resize(function() {
                board.resize();
            });

            initMenu();

            const firstCat = document.querySelector('#menu-container > div');
            firstCat.classList.add('category-open');
            const firstVarBtn = firstCat.querySelector('.variation-btn');
            selectVariation(0, 0, firstCat, firstVarBtn);
        });
    </script>
</body>
</html>
